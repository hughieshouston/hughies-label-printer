<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hughie's — Label Printer</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f4f4f4; margin: 0; padding: 16px; color: #222; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 16px; }
  .card { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  input, select { width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; }
  button { cursor: pointer; border: none; border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: 700; }
  .btn-primary { background: #3DDAB4; color: #063; width: 100%; margin-top: 14px; }
  .btn-outline { background: #fff; border: 1.5px solid #ccc; color: #333; }
  .btn-outline:hover { background: #f0f0f0; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #printer-status { font-size: 12px; color: #888; }
  #form-error { color: #c00; font-size: 13px; margin-top: 8px; display: none; }
  #app { display: none; }
  #debug-log { display: none; background: #111; color: #3DDAB4; border-radius: 8px; padding: 10px 12px; margin-top: 12px; font-family: monospace; font-size: 11px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
  .who { font-size: 12px; color: #888; margin-bottom: 12px; }
  .who button { background: none; border: none; color: #c00; text-decoration: underline; font-weight: 400; padding: 0; margin-left: 6px; }

  /* ── PIN login overlay — matches the other Hughie's kiosks exactly ── */
  #login-card {
    position: fixed; inset: 0; background: #111; z-index: 999;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    font-family: 'Montserrat', sans-serif;
  }
  #login-card .lp-login-box { width: 100%; max-width: 320px; text-align: center; }
  .lp-brand {
    font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 4px;
    text-transform: uppercase; line-height: 1; margin-bottom: 6px;
  }
  .lp-brand .dot-i { color: #E8192C; text-transform: lowercase; }
  .lp-subtitle {
    font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #3DDAB4;
    text-transform: uppercase; margin-bottom: 32px;
  }
  .lp-pin-label { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 16px; font-weight: 600; }
  #login-error { color: #ff7283; font-size: 13px; margin-bottom: 16px; font-weight: 600; display: none; }

  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(255,255,255,.15); transition: background .15s;
  }
  .pin-dot.filled { background: #3DDAB4; }
  .pin-key {
    background: #1e1e1e; border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px; color: #fff; font-size: 22px; font-weight: 700;
    font-family: 'Montserrat', sans-serif; padding: 18px 0;
    cursor: pointer; transition: background .1s;
  }
  .pin-key:active { background: #2a2a2a; }
  .pin-key-clear { font-size: 12px; color: rgba(255,255,255,.4); }
  .pin-key-del   { font-size: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏷️ Hughie's Label Printer</h1>

  <!-- LOGIN -->
  <div id="login-card">
    <div class="lp-login-box">
      <div class="lp-brand">HUGH<span class="dot-i">i</span>E'S</div>
      <div class="lp-subtitle">Label Printer Kiosk</div>
      <div class="lp-pin-label">Enter PIN to continue</div>

      <div style="display:flex;justify-content:center;gap:12px;margin-bottom:24px">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
      </div>

      <div id="login-error"></div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto">
        <button class="pin-key" onclick="lpPinKey('1')">1</button>
        <button class="pin-key" onclick="lpPinKey('2')">2</button>
        <button class="pin-key" onclick="lpPinKey('3')">3</button>
        <button class="pin-key" onclick="lpPinKey('4')">4</button>
        <button class="pin-key" onclick="lpPinKey('5')">5</button>
        <button class="pin-key" onclick="lpPinKey('6')">6</button>
        <button class="pin-key" onclick="lpPinKey('7')">7</button>
        <button class="pin-key" onclick="lpPinKey('8')">8</button>
        <button class="pin-key" onclick="lpPinKey('9')">9</button>
        <button class="pin-key pin-key-clear" onclick="lpPinClear()">Clear</button>
        <button class="pin-key" onclick="lpPinKey('0')">0</button>
        <button class="pin-key pin-key-del" onclick="lpPinDel()">⌫</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="who">Central Kitchen Label Station<button onclick="doLogout()">Lock</button></div>

    <div class="card">
      <div class="row">
        <span style="font-weight:700;font-size:13px">🖨️ Printer</span>
        <span id="printer-status">Not connected</span>
        <button class="btn-outline" style="margin-left:auto" id="connect-btn" onclick="connectPrinter()">Connect Printer</button>
        <button class="btn-outline" style="font-size:11px;padding:8px 10px" onclick="connectPrinter(true)" title="Use if the picker shows the printer but selecting it does nothing">Show All Devices</button>
        <button class="btn-outline" style="font-size:11px;padding:8px 10px" onclick="toggleDebugLog()">🐞 Log</button>
      </div>
      <div id="debug-log"></div>
    </div>

    <div class="row" style="align-items:flex-start;gap:20px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:260px">
        <label>Item *</label>
        <div style="position:relative">
          <input type="text" id="label-item-search" autocomplete="off" placeholder="Type to search…"
            oninput="filterItemList()" onfocus="filterItemList()">
          <div id="label-item-list" style="display:none;position:absolute;z-index:10;left:0;right:0;top:100%;background:#fff;border:1px solid #ddd;border-radius:8px;max-height:220px;overflow-y:auto;box-shadow:0 4px 14px rgba(0,0,0,.12);margin-top:2px"></div>
          <input type="hidden" id="label-item">
        </div>

        <label>Storage Type</label>
        <div id="storage-display" style="padding:8px 12px;background:#f5f5f5;border-radius:6px;font-size:13px;color:#555">—</div>

        <label>Temp Produced (°F) *</label>
        <input type="number" id="label-temp" placeholder="e.g. 38" style="max-width:160px" oninput="updatePreview()">

        <label>Operator *</label>
        <select id="label-operator" onchange="updatePreview()"><option value="">— Select Operator —</option></select>

        <label>Qty to Print</label>
        <input type="number" id="label-qty" value="1" min="1" max="50" style="max-width:100px">

        <button class="btn-primary" onclick="printBatchLabel()">🖨️ Print Label</button>
        <div id="form-error"></div>
      </div>

      <div style="flex:0 0 300px">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:10px">Label Preview (3″×5″)</div>
        <div id="label-preview" style="border:2px solid #333;padding:14px 14px 18px;width:300px;font-family:monospace;background:#fff;font-size:12px;box-sizing:border-box">
          <div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start">
            <div id="lp-qr" style="width:80px;height:80px;flex-shrink:0"></div>
            <div style="font-size:10px;line-height:1.6">
              <div id="lp-batch">Batch: —</div>
              <div id="lp-itemid" style="color:#888">—</div>
            </div>
          </div>
          <hr style="margin:6px 0;border:none;border-top:2px solid #333">
          <div id="lp-itemname" style="font-size:16px;font-weight:900;margin:6px 0;letter-spacing:.5px;text-transform:uppercase">—</div>
          <div id="lp-warning" style="background:#000;color:#fff;padding:5px 8px;font-weight:700;font-size:11px;text-align:center;margin:6px 0;letter-spacing:.5px">—</div>
          <table style="font-size:11px;margin:6px 0;width:100%;border-collapse:collapse">
            <tr><td style="color:#666;width:70px;padding:2px 0">Produced:</td><td id="lp-date" style="font-weight:600">—</td></tr>
            <tr><td style="color:#666;padding:2px 0">Time:</td>    <td id="lp-time"     style="font-weight:600">—</td></tr>
            <tr><td style="color:#666;padding:2px 0">Temp:</td>    <td id="lp-temp-lbl" style="font-weight:600">—</td></tr>
            <tr><td style="color:#666;padding:2px 0">Operator:</td><td id="lp-operator" style="font-weight:600">—</td></tr>
          </table>
          <hr style="margin:8px 0;border:none;border-top:3px solid #333">
          <div style="text-align:center;margin-top:8px">
            <div style="font-weight:700;font-size:12px;letter-spacing:1px">USE BY:</div>
            <div id="lp-useby" style="font-size:20px;font-weight:900;border:3px solid #000;padding:4px 14px;display:inline-block;margin-top:6px;letter-spacing:1px">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — update if the stable deployment URL ever changes
// ============================================================
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyva7bEId-pp2BLaj07tORWPRetJesbsmhoep8eP_xmiJQvdSCoxhyZT6UnSetEd3r6sg/exec';

// ============================================================
//  RPC helper — calls the Apps Script doPost JSON-RPC dispatcher.
//  Content-Type must stay text/plain so the browser treats this as a
//  "simple request" and skips a CORS preflight (Apps Script can't
//  answer an OPTIONS preflight, so a preflighted request would fail).
// ============================================================
function rpc(fn, args) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ fn: fn, args: args || [] })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error);
    return data.result;
  });
}

// ============================================================
//  AUTH — station is gated by a shared PIN (not a per-user login), like
//  the other kiosk pages. "Unlocked" is remembered in localStorage so the
//  station doesn't need the PIN re-entered every time it's opened.
// ============================================================
var _unlocked = localStorage.getItem('labelPrinterUnlocked') === 'yes';
var _foodCatalog = [];
var _lpPin = '';

function lpPinKey(digit) {
  if (_lpPin.length >= 4) return;
  _lpPin += digit;
  _updateLpPinDots();
  if (_lpPin.length === 4) doLogin();
}

function lpPinDel() {
  _lpPin = _lpPin.slice(0, -1);
  _updateLpPinDots();
}

function lpPinClear() {
  _lpPin = '';
  _updateLpPinDots();
  document.getElementById('login-error').style.display = 'none';
}

function _updateLpPinDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('dot-' + i);
    if (dot) dot.classList.toggle('filled', i < _lpPin.length);
  }
}

function doLogin() {
  var errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  rpc('labelKioskVerifyPin', [_lpPin])
    .then(function() {
      _unlocked = true;
      localStorage.setItem('labelPrinterUnlocked', 'yes');
      showApp();
    })
    .catch(function(e) {
      _lpPin = '';
      _updateLpPinDots();
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    });
}

function doLogout() {
  localStorage.removeItem('labelPrinterUnlocked');
  _unlocked = false;
  _lpPin = '';
  _updateLpPinDots();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-card').style.display = '';
}

function showApp() {
  document.getElementById('login-card').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
  updatePreview();
}

if (_unlocked) showApp();

function loadData() {
  rpc('labelKioskGetCatalog', [])
    .then(function(cat) {
      _foodCatalog = (cat || []).slice().sort(function(a, b) {
        return String(a.name || '').localeCompare(String(b.name || ''));
      });
    })
    .catch(function(e) { showFormError(e.message); });

  rpc('labelKioskGetOperators', [])
    .then(function(ops) {
      var sel = document.getElementById('label-operator');
      sel.innerHTML = '<option value="">— Select Operator —</option>' +
        (ops || []).map(function(o) { return '<option value="' + esc(o.name) + '">' + esc(o.name) + '</option>'; }).join('');
    })
    .catch(function(e) { showFormError(e.message); });
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showFormError(msg) { var el = document.getElementById('form-error'); el.textContent = msg; el.style.display = 'block'; }

function filterItemList() {
  var searchEl = document.getElementById('label-item-search');
  var hidden   = document.getElementById('label-item');
  if (hidden.value && hidden.getAttribute('data-name') !== searchEl.value) {
    hidden.value = '';
    hidden.removeAttribute('data-name');
    hidden.removeAttribute('data-storage');
    onItemSelect();
  }
  var q    = searchEl.value.trim().toLowerCase();
  var list = document.getElementById('label-item-list');
  var matches = (_foodCatalog || []).filter(function(i) {
    return !q || String(i.name || '').toLowerCase().indexOf(q) !== -1;
  });
  if (!matches.length) {
    list.innerHTML = '<div style="padding:10px 12px;color:#999;font-size:13px">No matches</div>';
  } else {
    list.innerHTML = matches.map(function(i) {
      return '<div class="label-item-opt" data-id="' + esc(i.id) + '" data-name="' + esc(i.name) + '" data-storage="' + esc(i.storageType || 'Refrigerated') + '" ' +
        'style="padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0" onclick="selectItem(this)">' + esc(i.name) + '</div>';
    }).join('');
  }
  list.style.display = 'block';
}

function selectItem(el) {
  var hidden = document.getElementById('label-item');
  hidden.value = el.getAttribute('data-id');
  hidden.setAttribute('data-name', el.getAttribute('data-name'));
  hidden.setAttribute('data-storage', el.getAttribute('data-storage'));
  document.getElementById('label-item-search').value = el.getAttribute('data-name');
  document.getElementById('label-item-list').style.display = 'none';
  onItemSelect();
}

document.addEventListener('click', function(e) {
  if (e.target.id !== 'label-item-search' && !e.target.closest('#label-item-list')) {
    var list = document.getElementById('label-item-list');
    if (list) list.style.display = 'none';
  }
});

function onItemSelect() {
  var el   = document.getElementById('label-item');
  var stor = el.value ? (el.getAttribute('data-storage') || 'Refrigerated') : '';
  var disp = document.getElementById('storage-display');
  disp.textContent = stor || '—';
  disp.style.color = stor === 'Frozen' ? '#007bff' : (stor ? '#28a745' : '#555');
  updatePreview();
}

function updatePreview() {
  var el       = document.getElementById('label-item');
  var itemId   = el.value || '';
  var itemName = el.getAttribute('data-name');
  var storage  = el.getAttribute('data-storage') || 'Refrigerated';
  var temp     = document.getElementById('label-temp').value || '';
  var operator = document.getElementById('label-operator').value || '';
  var now      = new Date();
  var batchId  = genBatchId();

  var warning = storage === 'Frozen' ? 'MAINTAIN AT 0°F OR BELOW' : 'MAINTAIN AT 41°F OR BELOW';
  var useBy   = itemId ? calcUseBy(storage) : '—';
  var qrData  = itemId ? (itemId + '|' + batchId) : '';

  var qrEl = document.getElementById('lp-qr');
  qrEl.innerHTML = '';
  if (qrData && typeof QRCode !== 'undefined') {
    try { new QRCode(qrEl, { text: qrData, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.H }); }
    catch(e) { qrEl.style.cssText = 'width:80px;height:80px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:9px;color:#999'; qrEl.textContent = 'QR'; }
  }

  var set = function(id, val) { document.getElementById(id).textContent = val; };
  set('lp-batch',    itemId ? 'Batch: ' + batchId : 'Batch: —');
  set('lp-itemid',   itemId || '—');
  set('lp-itemname', itemName || '—');
  set('lp-warning',  itemId ? warning : '—');
  set('lp-date',     itemId ? fmtDate(now) : '—');
  set('lp-time',     itemId ? fmtTime(now) : '—');
  set('lp-temp-lbl', temp ? temp + '°F' : '—');
  set('lp-operator', operator || '—');
  set('lp-useby',    useBy);
}

// ============================================================
//  LABEL / TSPL HELPERS
// ============================================================
function genBatchId() {
  var d = new Date(), p = function(n) { return n < 10 ? '0' + n : '' + n; };
  return 'B' + (d.getFullYear()+'').slice(2) + p(d.getMonth()+1) + p(d.getDate()) + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}
// Production day counts as day 1 of shelf life — Refrigerated: 7 days total (produced 7/18 →
// use by 7/24, so +6). Frozen: 6 months total (produced 7/18 → use by 1/17, so +6mo -1 day).
function calcUseBy(storageType) {
  var d = new Date();
  if (storageType === 'Frozen') { d.setMonth(d.getMonth() + 6); d.setDate(d.getDate() - 1); }
  else                          { d.setDate(d.getDate() + 6); }
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
}
function fmtDate(d) { return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }
function fmtTime(d) { var h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return h + ':' + (m < 10 ? '0'+m : m) + ' ' + ap; }

// 3" x 5" at 203 DPI = 609 x 1015 dots. Content inside a 100-dot left margin (confirmed
// against the real printer). QR bumped up for easier scanning, item name bigger/bolder, and
// spacing stretched to use the full height instead of leaving ~1" blank at the bottom.
function buildTspl(itemId, itemName, storageType, temp, operator, batchId, qty) {
  var now     = new Date();
  var datePd  = fmtDate(now);
  var timePd  = fmtTime(now);
  var useBy   = calcUseBy(storageType);
  var warning = storageType === 'Frozen' ? 'MAINTAIN AT 0 F OR BELOW' : 'MAINTAIN AT 41 F OR BELOW';
  var qrData  = itemId + '|' + batchId;
  var name    = itemName.toUpperCase();
  var L = 100, W = 470;
  // TSPL's built-in bitmap fonts have no bold variant — printing the same text a second time
  // offset by 2 dots overlaps and thickens the strokes ("double-strike") to fake bold.
  function bold(x, y, font, xm, ym, text) {
    return 'TEXT ' + x + ',' + y + ',"' + font + '",0,' + xm + ',' + ym + ',"' + text + '"\r\n' +
           'TEXT ' + (x + 2) + ',' + y + ',"' + font + '",0,' + xm + ',' + ym + ',"' + text + '"';
  }
  return [
    'SIZE 3 INCH,5 INCH',
    'GAP 0.12 INCH,0 INCH',
    'DIRECTION 0',
    'CLS',
    'QRCODE ' + L + ',40,H,9,A,0,"' + qrData + '"',
    'TEXT ' + (L + 245) + ',58,"3",0,1,1,"Batch:"',
    'TEXT ' + (L + 245) + ',95,"3",0,1,1,"' + batchId + '"',
    'TEXT ' + (L + 245) + ',132,"3",0,1,1,"' + itemId + '"',
    'BAR ' + L + ',290,' + W + ',5',
    bold(L, 315, '4', 2, 3, name),
    'BAR ' + L + ',430,' + W + ',6',
    'TEXT ' + L + ',455,"3",0,1,2,"' + warning + '"',
    'BAR ' + L + ',520,' + W + ',5',
    'TEXT ' + L + ',545,"3",0,1,1,"Produced: ' + datePd + '"',
    'TEXT ' + L + ',589,"3",0,1,1,"Time:     ' + timePd + '"',
    'TEXT ' + L + ',633,"3",0,1,1,"Temp:     ' + temp + ' F"',
    'TEXT ' + L + ',677,"3",0,1,1,"Operator: ' + operator + '"',
    'BAR ' + L + ',725,' + W + ',6',
    bold(L, 750, '4', 2, 2, 'USE BY:'),
    'BAR ' + L + ',850,' + W + ',5',
    bold(L, 875, '5', 3, 4, useBy),
    'PRINT ' + (qty || 1) + ',1'
  ].join('\r\n') + '\r\n';
}

// ============================================================
//  BLE — runs top-level in this tab, not inside an Apps Script iframe,
//  so the Permissions-Policy restriction that blocked this inside the
//  main app doesn't apply here.
// ============================================================
var _printerDevice = null;
var _printerTxChar = null;
// Broad list of BLE "serial passthrough" service UUIDs used across various cheap thermal
// printer modules (Nordic UART, HM-10 clones, ISSC transparent UART, generic serial, etc.) —
// Web Bluetooth only allows access to services listed here, so this needs to be broad since we
// don't know which one a given printer uses ahead of time.
var _BLE_SERVICES = [
  '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // Nordic UART
  '000018f0-0000-1000-8000-00805f9b34fb', // Generic serial
  '0000ffe0-0000-1000-8000-00805f9b34fb', // HM-10 style
  '49535343-fe7d-4ae5-8fa9-9fafd205e455', // ISSC transparent UART
  'e7810a71-73ae-499d-8c15-faa9aef0c3f2'  // Goojprt/Zjiang-style printer module
];

function log(msg) {
  var el = document.getElementById('debug-log');
  el.textContent += '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}
function toggleDebugLog() {
  var el = document.getElementById('debug-log');
  var isHidden = getComputedStyle(el).display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
}
function setPrinterStatus(connected) {
  document.getElementById('printer-status').textContent = connected ? ('✅ ' + (_printerDevice ? _printerDevice.name : 'Printer')) : '⚠️ Not connected';
  document.getElementById('printer-status').style.color = connected ? '#28a745' : '#888';
  var btn = document.getElementById('connect-btn');
  btn.textContent = connected ? 'Disconnect' : 'Connect Printer';
  btn.onclick = connected ? disconnectPrinter : function(){ connectPrinter(); };
}

async function connectPrinter(showAll) {
  log('--- Connect Printer tapped' + (showAll ? ' (show all devices mode)' : '') + ' ---');
  if (!navigator.bluetooth) {
    log('ERROR: navigator.bluetooth is undefined — this browser does not support Web Bluetooth.');
    alert('Web Bluetooth is not supported on this browser. Use Chrome or Edge.');
    return;
  }
  try {
    var opts = showAll
      ? { acceptAllDevices: true, optionalServices: _BLE_SERVICES }
      : { filters: [{ namePrefix: 'SP320' }, { namePrefix: 'iDPRT' }, { namePrefix: 'IDPRT' }], optionalServices: _BLE_SERVICES };
    log(showAll ? 'Opening device picker (all nearby devices)…' : 'Opening device picker (SP320 / iDPRT)…');
    _printerDevice = await navigator.bluetooth.requestDevice(opts);
    log('Device picked: ' + (_printerDevice.name || '(unnamed)') + ' — id: ' + _printerDevice.id);
    _printerDevice.addEventListener('gattserverdisconnected', function() {
      _printerTxChar = null;
      setPrinterStatus(false);
      log('Printer disconnected.');
    });
    log('Connecting to GATT server…');
    var server = await _printerDevice.gatt.connect();
    log('GATT connected. Scanning services for a writable characteristic…');
    _printerTxChar = null;
    for (var si = 0; si < _BLE_SERVICES.length && !_printerTxChar; si++) {
      try {
        log('  Trying service ' + _BLE_SERVICES[si] + '…');
        var svc = await server.getPrimaryService(_BLE_SERVICES[si]);
        log('  Service found. Listing all its characteristics…');
        var chars = await svc.getCharacteristics();
        for (var ci = 0; ci < chars.length; ci++) {
          var c = chars[ci];
          var p = c.properties;
          log('    ' + c.uuid + ' — write:' + p.write + ' writeNoResp:' + p.writeWithoutResponse + ' notify:' + p.notify + ' read:' + p.read);
          if (!_printerTxChar && (p.write || p.writeWithoutResponse)) {
            _printerTxChar = c;
            log('  ✓ Using writable characteristic: ' + c.uuid);
          }
        }
      } catch(se) { log('  Service not found: ' + se.message); }
    }
    if (!_printerTxChar) throw new Error('Printer connected but no writable characteristic was found on any known service. See log for full service/characteristic list — send this to support.');
    setPrinterStatus(true);
    log('--- Connected successfully ---');
  } catch(e) {
    log('ERROR (' + (e.name || 'Error') + '): ' + e.message);
    _printerDevice = null; _printerTxChar = null;
    setPrinterStatus(false);
    if (e.name === 'NotFoundError') log('(NotFoundError = picker was closed/cancelled without selecting a device.)');
    else alert('Connection failed: ' + e.message);
  }
}

function disconnectPrinter() {
  if (_printerDevice && _printerDevice.gatt.connected) _printerDevice.gatt.disconnect();
  _printerDevice = null; _printerTxChar = null;
  setPrinterStatus(false);
}

async function sendToPrinter(tspl) {
  if (!_printerTxChar) throw new Error('Printer not connected.');
  var bytes = new TextEncoder().encode(tspl);
  log('Sending ' + bytes.length + ' bytes to printer in ' + Math.ceil(bytes.length / 100) + ' chunk(s)…');
  for (var i = 0; i < bytes.length; i += 100) {
    await _printerTxChar.writeValue(bytes.slice(i, i + 100));
    await new Promise(function(r) { setTimeout(r, 20); });
  }
  log('✓ All bytes sent.');
}

//  PRINT
// ============================================================
async function printBatchLabel() {
  var errEl = document.getElementById('form-error');
  errEl.style.display = 'none';
  var el       = document.getElementById('label-item');
  var itemId   = el.value || '';
  var itemName = el.getAttribute('data-name');
  var storage  = el.getAttribute('data-storage') || 'Refrigerated';
  var temp     = document.getElementById('label-temp').value.trim();
  var operator = document.getElementById('label-operator').value.trim();
  var qty      = parseInt(document.getElementById('label-qty').value || '1') || 1;

  if (!itemId)   { showFormError('Please select an item.'); return; }
  if (!temp)     { showFormError('Please enter a temperature.'); return; }
  if (!operator) { showFormError('Please select an operator.'); return; }
  if (!_printerTxChar) { showFormError('Printer not connected. Tap Connect Printer first.'); return; }

  var batchId = genBatchId();
  var now     = new Date();
  var useBy   = calcUseBy(storage);

  try {
    var tspl = buildTspl(itemId, itemName, storage, temp, operator, batchId, qty);
    await sendToPrinter(tspl);
    rpc('labelKioskSaveBatchLabel', [{
      batchId: batchId, itemId: itemId, itemName: itemName,
      producedAt: fmtDate(now) + ' ' + fmtTime(now), operator: operator,
      tempProduced: temp, storageType: storage, useBy: useBy
    }]).catch(function(e) { console.error('Batch log failed:', e.message); });
    alert('Printed — Batch ' + batchId);
  } catch(e) {
    log('ERROR printing: ' + e.message);
    showFormError('Print failed: ' + e.message);
  }
}
